<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | GovTrade Grants</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <main class="max-w-lg mx-auto px-4 py-12">
    <a href="index.html" class="text-blue-700 hover:underline">← Back to sign in</a>
    <h1 class="text-3xl font-bold mt-4 mb-6">Reset your password</h1>
    <form class="bg-white p-6 rounded-xl border border-slate-200 space-y-4">
      <label class="block">
        <span class="block text-sm font-medium mb-1">Email address</span>
        <input type="email" required class="w-full border border-slate-300 rounded-lg px-3 py-2" placeholder="you@example.com">
      </label>
      <button type="submit" class="w-full bg-blue-700 text-white py-2.5 rounded-lg font-semibold">Send reset link</button>
    </form>
  </main>
</body>
</html>
