<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found | GovTrade Grants</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-900 text-white min-h-screen flex items-center justify-center px-4">
    <main class="text-center max-w-xl">
      <p class="text-blue-300 font-semibold">Error 404</p>
      <h1 class="text-4xl font-bold mt-2 mb-4">We couldn’t find that page.</h1>
      <p class="text-slate-300 mb-8">
        The link may be outdated or the page may have moved. You can return to the main portal and
        continue your application journey.
      </p>
      <div class="flex flex-wrap items-center justify-center gap-3">
        <a
          href="/"
          class="inline-flex bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg font-semibold"
          >Go to homepage</a
        >
        <a
          href="/support?source=404&subject=other&severity=medium&errorCode=ROUTE_NOT_FOUND"
          class="inline-flex border border-blue-300 hover:bg-slate-800 px-6 py-3 rounded-lg font-semibold"
          >Get support</a
        >
        <a
          href="/legal"
          class="inline-flex border border-slate-500 hover:bg-slate-800 px-6 py-3 rounded-lg font-semibold"
          >Legal policies</a
        >
      </div>
    </main>
  </body>
</html>
